    <body>
        
        <script>
           
        
        // parameters are the one which we write inside function
        function evenorodd(number){
            //conditional statement
            if(number%2==0){
                console.log("even");
            }
            else{
                console.log("odd");
            }
        }

        //caling function to check here we are goind to pass argument
        evenorodd(6);
        

        </script>
    </body>
